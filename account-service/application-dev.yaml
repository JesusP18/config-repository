server:
  port: 8081
spring:
  application:
    name: account-service
  mongodb:
    uri: mongodb://localhost:27017/account_db

logging:
  level:
    root: INFO
    com.account.service: INFO

client-service:
  url: http://localhost:8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true