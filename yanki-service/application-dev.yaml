server:
  port: 8006

spring:
  application:
    name: yanki-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/yanki_db
      auto-index-creation: true
  cloud:
    stream:
      bindings:
        yankiPaymentRequestProducer-out-0:
          destination: yanki-payment-requests
        yankiPaymentResponseConsumer-in-0:
          destination: yanki-payment-responses
          group: yanki-service-group
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    com.yanki.service: DEBUG
    org.springframework.cloud.stream: DEBUG
    org.springframework.kafka: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info