server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: client-service
          uri: lb://client-service
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - name: CircuitBreaker
              args:
                name: clientServiceCB
                fallbackUri: forward:/fallback/client
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountServiceCB
                fallbackUri: forward:/fallback/account
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        - id: credit-service
          uri: lb://credit-service
          predicates:
            - Path=/api/v1/credits/**
          filters:
            - name: CircuitBreaker
              args:
                name: creditServiceCB
                fallbackUri: forward:/fallback/credit
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionServiceCB
                fallbackUri: forward:/fallback/transaction
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms
        permitted-number-of-calls-in-half-open-state: 5
        register-health-indicator: true
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
    instances:
      clientServiceCB:
        base-config: default
      accountServiceCB:
        base-config: default
      creditServiceCB:
        base-config: default
      transactionServiceCB:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 2s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.HttpServerErrorException

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    io.github.resilience4j: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG