server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # CLIENT SERVICE
        - id: client-service
          uri: lb://CLIENT-SERVICE
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - name: CircuitBreaker
              args:
                name: clientServiceCB
                fallbackUri: forward:/fallback/client
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        # ACCOUNT SERVICE
        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountServiceCB
                fallbackUri: forward:/fallback/account
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        # CREDIT SERVICE
        - id: credit-service
          uri: lb://CREDIT-SERVICE
          predicates:
            - Path=/api/v1/credits/**
          filters:
            - name: CircuitBreaker
              args:
                name: creditServiceCB
                fallbackUri: forward:/fallback/credit
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH
        # TRANSACTION SERVICE
        - id: transaction-service
          uri: lb://TRANSACTION-SERVICE
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionServiceCB
                fallbackUri: forward:/fallback/transaction
            - name: Retry
              args:
                retries: 3
                statuses: INTERNAL_SERVER_ERROR, SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE,PATCH

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

# Configuración de Circuit Breaker (Resilience4j)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms
        permitted-number-of-calls-in-half-open-state: 5
        register-health-indicator: true
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s  # Timeout de 2 segundos
    instances:
      clientServiceCB:
        base-config: default
      accountServiceCB:
        base-config: default
      creditServiceCB:
        base-config: default
      transactionServiceCB:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 2s  #  Timeout de 2 segundos

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.HttpServerErrorException

# Actuator endpoints para monitoreo
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    io.github.resilience4j: DEBUG