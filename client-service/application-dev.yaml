server:
  port: 8000

spring:
  application:
    name: client-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/client_db

    redis:
      host: localhost
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

logging:
  level:
    root: INFO
    com.client.service: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true